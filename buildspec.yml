version: 0.2

env:
  variables:
    AWS_REGION: eu-west-2
    ECR_REPO: player-intelligence-ui
    IMAGE_TAG: latest

phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin 666127452756.dkr.ecr.$AWS_REGION.amazonaws.com

  build:
    commands:
      - docker build -t $ECR_REPO -f Dockerfile.ui .
      - docker tag $ECR_REPO:latest 666127452756.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG

  post_build:
    commands:
      - docker push 666127452756.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG
      - printf '[{"name":"ui","imageUri":"%s"}]' 666127452756.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json