services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: player-intelligence-api:local
    container_name: player-intelligence-api
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATA_PATH: /app/data/players.csv
      MODEL_PATH: /app/models/churn_model.pkl
      CHROMA_PATH: /app/rag/chroma_db
      AWS_REGION: eu-west-2
      S3_BUCKET: player-intelligence-data
      S3_KEY: datasets/players.csv
      S3_FALLBACK_TO_LOCAL: "true"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    image: player-intelligence-ui:local
    container_name: player-intelligence-ui
    environment:
      API_BASE_URL: http://api:8000
      STREAMLIT_HOST: 0.0.0.0
      STREAMLIT_PORT: 8501
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
